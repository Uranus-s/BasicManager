spring:
  datasource:
    url: ${DEV_DB_URL:jdbc:mysql://0.0.0.0:3306/basic_project?useSSL=false&serverTimezone=Asia/Shanghai}
    username: ${DEV_DB_USERNAME:root}
    password: ${DEV_DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  data:
    redis:
      mode: ${DEV_REDIS_MODE:cluster} # cluster/single
      password: ${DEV_REDIS_PASSWORD:}
      lettuce:
        cluster:
          refresh:
            adaptive: true
            period: 60s
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 1
          max-wait: 1000ms
      cluster:
        max-redirects: 3
        nodes:
          - ${DEV_REDIS_NODE_1:0.0.0.0:6379}
          - ${DEV_REDIS_NODE_2:0.0.0.0:6380}
          - ${DEV_REDIS_NODE_3:0.0.0.0:6381}
          - ${DEV_REDIS_NODE_4:0.0.0.0:6382}
          - ${DEV_REDIS_NODE_5:0.0.0.0:6383}
          - ${DEV_REDIS_NODE_6:0.0.0.0:6384}

logging:
  level:
    org.mybatis: debug
    com.basic.dao: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

basic:
  security:
    dev-master-token:
      enabled: ${DEV_MASTER_TOKEN_ENABLED:false}
      token: ${DEV_MASTER_TOKEN:}
      user-id: ${DEV_MASTER_TOKEN_USER_ID:0}
      username: ${DEV_MASTER_TOKEN_USERNAME:dev-master}
